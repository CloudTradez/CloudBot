<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Bot Trade Parser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    max-width: 700px;
    margin: 30px auto;
    padding: 0 15px;
    color: #111;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  h2 { font-size: 15px; margin: 25px 0 8px; }
  p { color: #444; font-size: 14px; }
  ol { font-size: 14px; color: #333; padding-left: 20px; }
  ol li { margin-bottom: 4px; }
  hr { margin: 20px 0; border: none; border-top: 1px solid #ccc; }

  label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: bold; }
  select, input[type=text] {
    font-size: 14px;
    padding: 5px;
    margin-bottom: 14px;
    width: 100%;
    max-width: 350px;
  }
  input[type=file] { margin-bottom: 14px; }

  button {
    font-size: 14px;
    padding: 6px 14px;
    margin-right: 8px;
    cursor: pointer;
  }

  #status { font-size: 13px; color: #555; margin-top: 6px; }
  #status.err { color: #b00020; }
  #status.ok { color: #256029; }

  #mapCard, #outputCard { display: none; }

  pre#outputBlock {
    background: #f5f5f5;
    border: 1px solid #ccc;
    padding: 12px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 500px;
    overflow-y: auto;
  }

  table { border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 4px 8px; text-align: left; }
</style>
</head>
<body>

  <h1>Cloud Bot Trade Parser</h1>

  <ol>
    <li>Go to your <a href="https://app.traderspost.io/app/account/trades?trades_search%5Buuid%5D=&trades_search%5BdateRangeInterval%5D=today&trades_search%5BstartDate%5D=&trades_search%5BendDate%5D=&trades_search%5BconnectedBroker%5D=&trades_search%5Bstrategy%5D=&trades_search%5BstrategySubscription%5D=&trades_search%5Bticker%5D=&trades_search%5Bstatus%5D=&trades_search%5Bmode%5D=&trades_search%5BassetClass%5D=" target="_blank">TradersPost trades page</a>.</li>
    <li>Click Export (top right) and save the CSV.</li>
    <li>Upload it below.</li>
  </ol>

  <hr>

  <h2>Upload CSV</h2>
  <input type="file" id="fileInput" accept=".csv">
  <div id="status"></div>

  <div id="mapCard">
    <h2>Options and Futures</h2>

    <label for="subFilter">Strategy subscription</label>
    <select id="subFilter"></select>

    <div id="notices"></div>

    <button id="generateBtn">Generate recap</button>
  </div>

  <div id="outputCard">
    <h2>Recap</h2>
    <button id="copyBtn">Copy</button>
    <pre id="outputBlock"></pre>

    <details>
      <summary>Debug: parsed trades</summary>
      <div id="debugTable"></div>
    </details>
  </div>

<script>
(function(){
  let RAW_ROWS = [];

  const fileInput = document.getElementById('fileInput');
  const statusEl = document.getElementById('status');
  const mapCard = document.getElementById('mapCard');
  const subFilter = document.getElementById('subFilter');
  const noticesEl = document.getElementById('notices');
  const outputCard = document.getElementById('outputCard');
  const outputBlock = document.getElementById('outputBlock');
  const copyBtn = document.getElementById('copyBtn');
  const debugTable = document.getElementById('debugTable');

  function setStatus(msg, cls){
    statusEl.textContent = msg;
    statusEl.className = cls || '';
  }

  fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFile(e.target.files[0]);
  });

  function handleFile(file){
    if (!/\.csv$/i.test(file.name)){
      setStatus('Please upload a .csv file.', 'err');
      return;
    }
    setStatus('Parsing…');
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: function(results){
        if (!results.data.length){
          setStatus('That CSV has no rows.', 'err');
          return;
        }
        const required = ['Created At','Strategy Subscription UUID','Strategy Subscription Name','Signal Payload','Ticker Name','Status','Trade Result'];
        const headers = results.meta.fields || [];
        const missing = required.filter(h => !headers.includes(h));
        if (missing.length){
          setStatus('This CSV is missing expected columns: ' + missing.join(', '), 'err');
          return;
        }
        RAW_ROWS = results.data;
        setStatus(`Loaded ${RAW_ROWS.length} rows.`, 'ok');
        buildOptionsUI();
      },
      error: function(err){
        setStatus('Could not parse this file: ' + err.message, 'err');
      }
    });
  }

  function norm(s){
    return (s || '').toString().trim().toLowerCase();
  }

  function safeParseJSON(s){
    try { return JSON.parse(s); } catch(e){ return null; }
  }

  function countClosedTrades(subRows){
    const sorted = subRows.slice().sort((a, b) => {
      const ca = a['Created At'] || '';
      const cb = b['Created At'] || '';
      return ca < cb ? -1 : ca > cb ? 1 : 0;
    });
    const entryQueues = new Map();
    let count = 0;
    sorted.forEach(row => {
      const result = safeParseJSON(row['Trade Result']) || {};
      const plan = result.tradePlan || {};
      const eo = plan.entryOrder;
      const xo = plan.exitOrder;
      if (eo && norm(eo.status) === 'filled'){
        if (!entryQueues.has(eo.symbol)) entryQueues.set(eo.symbol, 0);
        entryQueues.set(eo.symbol, entryQueues.get(eo.symbol) + 1);
      }
      if (xo && norm(xo.status) === 'filled'){
        const n = entryQueues.get(xo.symbol) || 0;
        if (n > 0){
          entryQueues.set(xo.symbol, n - 1);
          count++;
        }
      }
    });
    return count;
  }

  function buildOptionsUI(){
    const subs = new Map();
    RAW_ROWS.forEach(r => {
      const uuid = r['Strategy Subscription UUID'];
      if (!uuid || subs.has(uuid)) return;
      const result = safeParseJSON(r['Trade Result']) || {};
      const plan = result.tradePlan || {};
      const order = plan.entryOrder || plan.exitOrder || {};
      subs.set(uuid, { name: r['Strategy Subscription Name'], mode: order.mode || '' });
    });

    const nameCounts = new Map();
    subs.forEach(info => nameCounts.set(info.name, (nameCounts.get(info.name)||0) + 1));

    const modeCounts = new Map();
    subs.forEach(info => {
      const key = info.name + '|' + info.mode;
      modeCounts.set(key, (modeCounts.get(key)||0) + 1);
    });

    subFilter.innerHTML = '';
    let bestUuid = null, bestCount = 0;
    const seenLabelIndex = new Map();
    subs.forEach((info, uuid) => {
      let label = info.name;
      if (nameCounts.get(info.name) > 1){
        if (info.mode) label += ` — ${info.mode}`;
        const key = info.name + '|' + info.mode;
        if (modeCounts.get(key) > 1){
          const idx = (seenLabelIndex.get(key) || 0) + 1;
          seenLabelIndex.set(key, idx);
          label += ` #${idx}`;
        }
      }
      const o = document.createElement('option');
      o.value = uuid; o.textContent = label;
      subFilter.appendChild(o);

      const tradeCount = countClosedTrades(RAW_ROWS.filter(r => r['Strategy Subscription UUID'] === uuid));
      if (tradeCount > bestCount){ bestCount = tradeCount; bestUuid = uuid; }
    });

    const allOption = document.createElement('option');
    allOption.value = '__ALL__'; allOption.textContent = 'All trades';
    subFilter.appendChild(allOption);

    subFilter.value = bestUuid || '__ALL__';

    mapCard.style.display = 'block';
    outputCard.style.display = 'none';
  }

  function parseContract(symbol){
    if (!symbol) return { ticker: '', strike: null, type: null };
    const m = symbol.match(/^([A-Z.]+)\s+(\d{6})([CP])(\d+(?:\.\d+)?)$/);
    if (m) return { ticker: m[1], strike: m[4], type: m[3] };
    return { ticker: symbol, strike: null, type: null };
  }

  const FUTURES_MULTIPLIERS = {
    'ES':50,'MES':5,'NQ':20,'MNQ':2,'YM':5,'MYM':0.5,'RTY':50,'M2K':5,
    'CL':1000,'MCL':100,'NG':10000,'MNG':1000,'QG':2500,'RB':42000,'HO':42000,
    'GC':100,'MGC':10,'SI':5000,'SIL':1000,'HG':25000,'MHG':2500,'PL':50,'PA':100,
    'ZB':1000,'ZN':1000,'ZF':1000,'ZT':2000,'UB':1000,
    'ZC':50,'ZS':50,'ZW':50,'ZL':600,'ZM':100,'KE':50,
    'BTC':5,'MBT':0.1,'ETH':50,'MET':0.1,'BRR':5
  };

  function futuresRoot(symbol){
    if (!symbol) return null;
    const m = symbol.match(/^([A-Z0-9]{1,4})[FGHJKMNQUVXZ]\d{4}$/);
    const root = m ? m[1] : symbol;
    return FUTURES_MULTIPLIERS.hasOwnProperty(root) ? root : null;
  }

  function money(v){
    return v < 0 ? `-$${Math.abs(v).toFixed(2)}` : `+$${v.toFixed(2)}`;
  }

  function contractDisplay(c){
    if (c.isFutures) return `$${c.ticker}`;
    if (c.type && c.strike) return `$${c.ticker} ${c.strike}${c.type}`;
    return `$${c.ticker}`;
  }

  const ORD = n => { const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function dateOnly(isoLike){
    if (!isoLike) return null;
    return isoLike.slice(0,10);
  }

  function formatRecapDate(yyyy_mm_dd){
    const d = new Date(yyyy_mm_dd + 'T12:00:00Z');
    return `${WEEKDAYS[d.getUTCDay()]}, ${MONTHS[d.getUTCMonth()]} ${ORD(d.getUTCDate())}`;
  }

  document.getElementById('generateBtn').addEventListener('click', generate);

  function generate(){
    const subUuid = subFilter.value;
    const rows = RAW_ROWS
      .filter(r => subUuid === '__ALL__' || r['Strategy Subscription UUID'] === subUuid)
      .slice()
      .sort((a, b) => {
        const ca = a['Created At'] || '';
        const cb = b['Created At'] || '';
        return ca < cb ? -1 : ca > cb ? 1 : 0;
      });

    const entryQueues = new Map();
    const didNotFill = [];
    const seenDNF = new Set();
    const trades = [];
    const dateCounts = new Map();

    rows.forEach(row => {
      const signal = safeParseJSON(row['Signal Payload']) || {};
      const result = safeParseJSON(row['Trade Result']) || {};
      const plan = result.tradePlan || {};
      const eo = plan.entryOrder;
      const xo = plan.exitOrder;
      const action = signal.action;
      const ticker = row['Ticker Name'];

      if (eo){
        if (norm(eo.status) === 'filled'){
          const sym = eo.symbol;
          if (!entryQueues.has(sym)) entryQueues.set(sym, []);
          entryQueues.get(sym).push({
            price: parseFloat(eo.filledAvgPrice),
            side: norm(eo.side),
            time: eo.filledAt
          });
          const d = dateOnly(eo.filledAt);
          if (d) dateCounts.set(d, (dateCounts.get(d)||0) + 1);
        } else if (norm(eo.status) === 'rejected' || norm(eo.status) === 'canceled'){
          if (!seenDNF.has(ticker)){ seenDNF.add(ticker); didNotFill.push(ticker); }
        }
      } else if ((norm(action) === 'buy' || norm(action) === 'sell' || norm(action) === 'reverse') && norm(row['Status']) === 'rejected'){
        if (!seenDNF.has(ticker)){ seenDNF.add(ticker); didNotFill.push(ticker); }
      }

      if (xo && norm(xo.status) === 'filled'){
        const sym = xo.symbol;
        const queue = entryQueues.get(sym);
        if (queue && queue.length){
          const entry = queue.shift();
          const exitPrice = parseFloat(xo.filledAvgPrice);
          const entryPrice = entry.price;
          const isShort = entry.side === 'sell';
          const root = futuresRoot(sym);
          const isFutures = !!root;
          const pointDiff = isShort ? (entryPrice-exitPrice) : (exitPrice-entryPrice);
          const dollarDiff = isFutures ? pointDiff * FUTURES_MULTIPLIERS[root] : null;
          let pct = isShort ? ((entryPrice-exitPrice)/entryPrice)*100 : ((exitPrice-entryPrice)/entryPrice)*100;
          if (isFinite(pct) && !(isFutures && exitPrice === 0)){
            const contract = isFutures ? { ticker: root, strike: null, type: null, isFutures: true } : parseContract(sym);
            trades.push({ contract, entryPrice, exitPrice, pct, pointDiff, dollarDiff, isFutures });
          }
        }
      }
    });

    trades.sort((a,b) => (b.isFutures ? b.dollarDiff : b.pct) - (a.isFutures ? a.dollarDiff : a.pct));

    const wins = trades.filter(t => t.pct >= -0.005).length;
    const losses = trades.length - wins;
    const pctTrades = trades.filter(t => !t.isFutures);
    const gainSum = pctTrades.filter(t=>t.pct>0).reduce((s,t)=>s+t.pct,0);
    const lossSum = pctTrades.filter(t=>t.pct<0).reduce((s,t)=>s+t.pct,0);
    const net = gainSum + lossSum;

    const futuresTrades = trades.filter(t => t.isFutures);
    const futuresByRoot = new Map();
    futuresTrades.forEach(t => {
      const root = t.contract.ticker;
      if (!futuresByRoot.has(root)) futuresByRoot.set(root, []);
      futuresByRoot.get(root).push(t);
    });

    let recapDateStr = '';
    {
      let bestDate = null, bestCount = -1;
      dateCounts.forEach((count, d) => { if (count > bestCount){ bestCount = count; bestDate = d; } });
      recapDateStr = bestDate ? formatRecapDate(bestDate) : '';
    }

    const lines = [];
    lines.push(`**Cloud Bot Recap (${recapDateStr})**`);
    trades.forEach((t, i) => {
      const emoji = (t.isFutures ? t.dollarDiff : t.pct) < -0.005 ? ':red_square:' : ':green_square:';
      let valStr;
      if (t.isFutures){
        valStr = Math.abs(t.dollarDiff) < 0.005 ? 'BE' : money(t.dollarDiff);
      } else {
        valStr = Math.abs(t.pct) < 0.005 ? 'BE' : `${t.pct>0?'+':''}${t.pct.toFixed(2)}%`;
      }
      lines.push(`${i+1}. ${emoji} ${contractDisplay(t.contract)} @ $${t.entryPrice.toFixed(2)} -> $${t.exitPrice.toFixed(2)} (${valStr})`);
    });
    lines.push('');
    if (didNotFill.length){
      lines.push(`Did not fill: ${didNotFill.join(', ')}`);
    }
    lines.push(`Total Trades: ${trades.length} (${wins} W, ${losses} L)`);
    if (pctTrades.length){
      lines.push(`Net Profit: **${net>0?'+':''}${net.toFixed(2)}%** (+${gainSum.toFixed(2)}% gain, ${lossSum.toFixed(2)}% loss)`);
    }
    if (futuresByRoot.size === 1){
      const [root, list] = [...futuresByRoot.entries()][0];
      const g = list.filter(t=>t.dollarDiff>0).reduce((s,t)=>s+t.dollarDiff,0);
      const l = list.filter(t=>t.dollarDiff<0).reduce((s,t)=>s+t.dollarDiff,0);
      lines.push(`Net Profit: ${money(g+l)} per contract (${money(g)} gain, ${money(l)} loss)`);
    } else if (futuresByRoot.size > 1){
      futuresByRoot.forEach((list, root) => {
        const g = list.filter(t=>t.dollarDiff>0).reduce((s,t)=>s+t.dollarDiff,0);
        const l = list.filter(t=>t.dollarDiff<0).reduce((s,t)=>s+t.dollarDiff,0);
        lines.push(`Net Profit (${root}): ${money(g+l)} per contract (${money(g)} gain, ${money(l)} loss)`);
      });
      const allG = futuresTrades.filter(t=>t.dollarDiff>0).reduce((s,t)=>s+t.dollarDiff,0);
      const allL = futuresTrades.filter(t=>t.dollarDiff<0).reduce((s,t)=>s+t.dollarDiff,0);
      lines.push(`Net Profit (All): ${money(allG+allL)} per contract (${money(allG)} gain, ${money(allL)} loss)`);
    }

    outputBlock.textContent = lines.join('\n');

    noticesEl.innerHTML = '';
    if (!trades.length){
      const d = document.createElement('div');
      d.textContent = `No closed trades found for this subscription. Try a different one above.`;
      d.style.color = '#b00020';
      d.style.fontSize = '13px';
      noticesEl.appendChild(d);
    }

    if (trades.length){
      let html = '<table><tr><th>Contract</th><th>Entry</th><th>Exit</th><th>%</th></tr>';
      trades.forEach(t => {
        const val = t.isFutures ? money(t.dollarDiff) : `${t.pct.toFixed(2)}%`;
        html += `<tr><td>${contractDisplay(t.contract)}</td><td>$${t.entryPrice.toFixed(2)}</td><td>$${t.exitPrice.toFixed(2)}</td><td>${val}</td></tr>`;
      });
      html += '</table>';
      debugTable.innerHTML = html;
    } else {
      debugTable.innerHTML = '';
    }

    outputCard.style.display = 'block';
  }

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(outputBlock.textContent).then(() => {
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    });
  });
})();
</script>
</body>
</html>
