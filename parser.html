<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Bot Trade Parser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --ink: #1c1e21;
    --muted: #6a6f76;
    --line: #e5e7eb;
    --panel: #f7f8f9;
    --accent: #2f6f5e;      /* muted teal, used sparingly */
    --pos: #1f7a4d;
    --neg: #b23a3a;
    --radius: 6px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 660px;
    margin: 48px auto;
    padding: 0 20px;
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
  h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 32px 0 12px; }
  p { color: var(--muted); font-size: 14px; }
  a { color: #2563eb; }

  ol { font-size: 14px; color: var(--muted); padding-left: 18px; margin: 8px 0 0; }
  ol li { margin-bottom: 3px; }

  hr { margin: 28px 0; border: none; border-top: 1px solid var(--line); }

  label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: 600; color: var(--ink); }

  select, input[type=text] {
    font: inherit;
    font-size: 14px;
    padding: 8px 10px;
    margin-bottom: 4px;
    width: 100%;
    max-width: 360px;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  input[type=file] { font-size: 14px; margin-bottom: 4px; }
  select:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: var(--accent);
  }

  button {
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    margin-right: 8px;
    color: #fff;
    background: var(--ink);
    border: 1px solid var(--ink);
    border-radius: var(--radius);
    cursor: pointer;
  }
  button:hover { background: #33373c; border-color: #33373c; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #copyBtn { color: var(--ink); background: #fff; border-color: var(--line); }
  #copyBtn:hover { background: var(--panel); border-color: #d3d7dc; }

  #status { font-size: 13px; color: var(--muted); margin-top: 10px; }
  #status.err { color: var(--neg); }
  #status.ok { color: var(--pos); }

  #mapCard, #outputCard { display: none; }
  #notices { margin: 8px 0; }

  pre#outputBlock {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 520px;
    overflow-y: auto;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

  <h1>Cloud Bot Trade Parser</h1>

  <ol>
    <li>Go to your <a href="https://app.traderspost.io/app/account/trades?trades_search%5Buuid%5D=&trades_search%5BdateRangeInterval%5D=today&trades_search%5BstartDate%5D=&trades_search%5BendDate%5D=&trades_search%5BconnectedBroker%5D=&trades_search%5Bstrategy%5D=&trades_search%5BstrategySubscription%5D=&trades_search%5Bticker%5D=&trades_search%5Bstatus%5D=submitted&trades_search%5Bmode%5D=&trades_search%5BassetClass%5D=" target="_blank">TradersPost trades page</a>.</li>
    <li>Click Export (top right) and save the CSV.</li>
    <li>Upload it below.</li>
  </ol>

  <hr>

  <h2>Upload CSV</h2>
  <input type="file" id="fileInput" accept=".csv">
  <div id="status"></div>

  <div id="mapCard">
    <h2>Options and Futures</h2>

    <label for="subFilter">Strategy subscription</label>
    <select id="subFilter"></select>

    <div id="notices"></div>

    <button id="generateBtn">Generate recap</button>
  </div>

  <div id="outputCard">
    <h2>Recap</h2>
    <button id="copyBtn">Copy</button>
    <pre id="outputBlock"></pre>
  </div>

  <footer>Cloud Bot is not affiliated with, endorsed by, or sponsored by TradersPost.</footer>

<script>
(function(){
  let RAW_ROWS = [];

  const fileInput = document.getElementById('fileInput');
  const statusEl = document.getElementById('status');
  const mapCard = document.getElementById('mapCard');
  const subFilter = document.getElementById('subFilter');
  const noticesEl = document.getElementById('notices');
  const outputCard = document.getElementById('outputCard');
  const outputBlock = document.getElementById('outputBlock');
  const copyBtn = document.getElementById('copyBtn');

  function setStatus(msg, cls){
    statusEl.textContent = msg;
    statusEl.className = cls || '';
  }

  fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFile(e.target.files[0]);
  });

  function handleFile(file){
    if (!/\.csv$/i.test(file.name)){
      setStatus('Please upload a .csv file.', 'err');
      return;
    }
    setStatus('Parsing…');
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: function(results){
        if (!results.data.length){
          setStatus('That CSV has no rows.', 'err');
          return;
        }
        const required = ['Created At','Strategy Subscription UUID','Strategy Subscription Name','Signal Payload','Ticker Name','Status','Trade Result'];
        const headers = results.meta.fields || [];
        const missing = required.filter(h => !headers.includes(h));
        if (missing.length){
          setStatus('This CSV is missing expected columns: ' + missing.join(', '), 'err');
          return;
        }
        RAW_ROWS = results.data;
        setStatus(`Loaded ${RAW_ROWS.length} rows.`, 'ok');
        buildOptionsUI();
      },
      error: function(err){
        setStatus('Could not parse this file: ' + err.message, 'err');
      }
    });
  }

  function norm(s){
    return (s || '').toString().trim().toLowerCase();
  }

  function safeParseJSON(s){
    try { return JSON.parse(s); } catch(e){ return null; }
  }

  // Exit statuses that mean the order never filled. Because the export isn't
  // backfilled, a still-working exit shows "open" now but will resolve to one
  // of these (didn't fill) or "executed"/"filled" (did) on a later export.
  const DEAD_STATUSES = new Set(['canceled','cancelled','rejected','failed','expired']);

  // The TradersPost export is NOT backfilled: an exit order can still say
  // "open" even though the position has since closed. So we don't trust the
  // exit order's status/fill. Instead, every exit row that closes a real
  // position carries openPosition (the position being closed, incl. its true
  // avgEntryPrice) and exitQuote (the live bid/ask/mark at signal time).
  //
  // Exit price for a reconstructed trade:
  //   1. exitOrder.filledAvgPrice — the actual fill, when it was backfilled
  //   2. otherwise estimate halfway between the adverse side and the midpoint:
  //        (bid + mid) / 2 for a sell exit, (ask + mid) / 2 for a buy exit
  //        — i.e. a quarter of the spread in from the touch.
  // Returns { price, estimated } or null.
  function estimateExitPrice(xo, eq){
    const fill = xo ? parseFloat(xo.filledAvgPrice) : NaN;
    if (isFinite(fill) && fill !== 0) return { price: fill, estimated: false };
    if (!eq) return null;

    let mid = parseFloat(eq.mark);
    if (!isFinite(mid)){
      const b = parseFloat(eq.bid), a = parseFloat(eq.ask);
      mid = (isFinite(b) && isFinite(a)) ? (b + a) / 2 : parseFloat(eq.last);
    }
    if (!isFinite(mid)) return null;

    const side = norm(xo && xo.side);
    const adverse = parseFloat(side === 'buy' ? eq.ask : eq.bid);
    const price = isFinite(adverse) ? (adverse + mid) / 2 : mid;
    return { price, estimated: true };
  }

  // A closed trade = an exit row that was closing a real position.
  function extractExitTrade(row){
    const result = safeParseJSON(row['Trade Result']) || {};
    const plan = result.tradePlan || {};
    const xo = plan.exitOrder;
    const op = plan.openPosition;
    const eq = plan.exitQuote;
    if (!xo || !op || op.avgEntryPrice == null) return null;
    if (DEAD_STATUSES.has(norm(xo.status))) return null;   // cancelled/rejected exit — never filled

    const entryPrice = parseFloat(op.avgEntryPrice);
    if (!isFinite(entryPrice) || entryPrice === 0) return null;
    const isShort = norm(op.side) === 'short';
    const est = estimateExitPrice(xo, eq);
    if (!est) return null;
    const exitPrice = est.price;

    const symbol  = op.symbol || xo.symbol;
    const assetClass = norm(op.assetClass);
    const isFutures = assetClass === 'future' || assetClass === 'futures';
    const multiplier = parseFloat(op.pointValue);   // $ per point, per contract

    const pointDiff  = isShort ? (entryPrice - exitPrice) : (exitPrice - entryPrice);
    const dollarDiff = (isFutures && isFinite(multiplier)) ? pointDiff * multiplier : null;
    const pct = isShort ? ((entryPrice - exitPrice) / entryPrice) * 100
                        : ((exitPrice - entryPrice) / entryPrice) * 100;
    if (!isFinite(pct) || (isFutures && exitPrice === 0)) return null;

    const contract = isFutures
      ? { ticker: futuresTicker(symbol), strike: null, type: null, isFutures: true }
      : parseContract(symbol);
    const exitTime = (xo.filledAt) || (eq && eq.updatedAt) || row['Created At'];

    return { contract, entryPrice, exitPrice, pct, pointDiff, dollarDiff, isFutures, estimated: est.estimated, exitTime };
  }

  function countClosedTrades(subRows){
    let count = 0;
    subRows.forEach(row => { if (extractExitTrade(row)) count++; });
    return count;
  }

  function buildOptionsUI(){
    const subs = new Map();
    RAW_ROWS.forEach(r => {
      const uuid = r['Strategy Subscription UUID'];
      if (!uuid || subs.has(uuid)) return;
      const result = safeParseJSON(r['Trade Result']) || {};
      const plan = result.tradePlan || {};
      const order = plan.entryOrder || plan.exitOrder || {};
      subs.set(uuid, { name: r['Strategy Subscription Name'], mode: order.mode || '' });
    });

    const nameCounts = new Map();
    subs.forEach(info => nameCounts.set(info.name, (nameCounts.get(info.name)||0) + 1));

    const modeCounts = new Map();
    subs.forEach(info => {
      const key = info.name + '|' + info.mode;
      modeCounts.set(key, (modeCounts.get(key)||0) + 1);
    });

    subFilter.innerHTML = '';
    let bestUuid = null, bestCount = 0;
    const seenLabelIndex = new Map();
    subs.forEach((info, uuid) => {
      let label = info.name;
      if (nameCounts.get(info.name) > 1){
        if (info.mode) label += ` — ${info.mode}`;
        const key = info.name + '|' + info.mode;
        if (modeCounts.get(key) > 1){
          const idx = (seenLabelIndex.get(key) || 0) + 1;
          seenLabelIndex.set(key, idx);
          label += ` #${idx}`;
        }
      }
      const o = document.createElement('option');
      o.value = uuid; o.textContent = label;
      subFilter.appendChild(o);

      const tradeCount = countClosedTrades(RAW_ROWS.filter(r => r['Strategy Subscription UUID'] === uuid));
      if (tradeCount > bestCount){ bestCount = tradeCount; bestUuid = uuid; }
    });

    const allOption = document.createElement('option');
    allOption.value = '__ALL__'; allOption.textContent = 'All trades';
    subFilter.appendChild(allOption);

    subFilter.value = bestUuid || '__ALL__';

    mapCard.style.display = 'block';
    outputCard.style.display = 'none';
  }

  function parseContract(symbol){
    if (!symbol) return { ticker: '', strike: null, type: null };
    const m = symbol.match(/^([A-Z.]+)\s+(\d{6})([CP])(\d+(?:\.\d+)?)$/);
    if (m) return { ticker: m[1], strike: m[4], type: m[3] };
    return { ticker: symbol, strike: null, type: null };
  }

  // Futures dollar P&L uses openPosition.pointValue directly, so no multiplier
  // table is needed. This only cleans up the contract symbol for display, e.g.
  // "ESZ2025" -> "ES", "/MNQH2026" -> "MNQ".
  function futuresTicker(symbol){
    if (!symbol) return symbol;
    const s = symbol.replace(/^\//, '').trim();
    const m = s.match(/^([A-Z0-9]{1,4})[FGHJKMNQUVXZ]\d{1,4}$/);
    return m ? m[1] : s;
  }

  function money(v){
    return v < 0 ? `-$${Math.abs(v).toFixed(2)}` : `+$${v.toFixed(2)}`;
  }

  function contractDisplay(c){
    if (c.isFutures) return `$${c.ticker}`;
    if (c.type && c.strike) return `$${c.ticker} ${c.strike}${c.type}`;
    return `$${c.ticker}`;
  }

  const ORD = n => { const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function dateOnly(isoLike){
    if (!isoLike) return null;
    return isoLike.slice(0,10);
  }

  function formatRecapDate(yyyy_mm_dd){
    const d = new Date(yyyy_mm_dd + 'T12:00:00Z');
    return `${WEEKDAYS[d.getUTCDay()]}, ${MONTHS[d.getUTCMonth()]} ${ORD(d.getUTCDate())}`;
  }

  document.getElementById('generateBtn').addEventListener('click', generate);

  function generate(){
    const subUuid = subFilter.value;
    const rows = RAW_ROWS
      .filter(r => subUuid === '__ALL__' || r['Strategy Subscription UUID'] === subUuid)
      .slice()
      .sort((a, b) => {
        const ca = a['Created At'] || '';
        const cb = b['Created At'] || '';
        return ca < cb ? -1 : ca > cb ? 1 : 0;
      });

    const didNotFill = [];
    const seenDNF = new Set();
    const trades = [];
    const dateCounts = new Map();
    let hasLive = false;

    rows.forEach(row => {
      const result = safeParseJSON(row['Trade Result']) || {};
      const plan = result.tradePlan || {};
      const eo = plan.entryOrder;
      const ticker = row['Ticker Name'];
      const anyOrder = eo || plan.exitOrder || {};
      if (norm(anyOrder.mode) === 'live') hasLive = true;

      // Closed trade, reconstructed from the exit row (fill or quote estimate).
      const trade = extractExitTrade(row);
      if (trade){
        trades.push(trade);
        const d = dateOnly(trade.exitTime);
        if (d) dateCounts.set(d, (dateCounts.get(d) || 0) + 1);
      }

      // Orders sent but never filled — identified by a cancelled/rejected/etc.
      // status on the entry or exit order (the reliable "did not fill" signal),
      // or a rejected/failed row when no order object was ever created.
      const xo = plan.exitOrder;
      const deadEntry = eo && DEAD_STATUSES.has(norm(eo.status));
      const deadExit  = xo && DEAD_STATUSES.has(norm(xo.status));
      const deadRow   = !eo && !xo && (norm(row['Status']) === 'rejected' || norm(row['Status']) === 'failed');
      if (deadEntry || deadExit || deadRow){
        if (ticker && !seenDNF.has(ticker)){ seenDNF.add(ticker); didNotFill.push(ticker); }
      }
    });

    trades.sort((a,b) => (b.isFutures ? b.dollarDiff : b.pct) - (a.isFutures ? a.dollarDiff : a.pct));

    const wins = trades.filter(t => t.pct >= -0.005).length;
    const losses = trades.length - wins;
    const pctTrades = trades.filter(t => !t.isFutures);
    const gainSum = pctTrades.filter(t=>t.pct>0).reduce((s,t)=>s+t.pct,0);
    const lossSum = pctTrades.filter(t=>t.pct<0).reduce((s,t)=>s+t.pct,0);
    const net = gainSum + lossSum;

    const futuresTrades = trades.filter(t => t.isFutures);
    const futuresByRoot = new Map();
    futuresTrades.forEach(t => {
      const root = t.contract.ticker;
      if (!futuresByRoot.has(root)) futuresByRoot.set(root, []);
      futuresByRoot.get(root).push(t);
    });

    let recapDateStr = '';
    {
      let bestDate = null, bestCount = -1;
      dateCounts.forEach((count, d) => { if (count > bestCount){ bestCount = count; bestDate = d; } });
      recapDateStr = bestDate ? formatRecapDate(bestDate) : '';
    }

    const lines = [];
    lines.push(`**Cloud Bot Recap (${recapDateStr})**`);
    trades.forEach((t, i) => {
      const emoji = (t.isFutures ? t.dollarDiff : t.pct) < -0.005 ? ':red_square:' : ':green_square:';
      let valStr;
      if (t.isFutures){
        valStr = Math.abs(t.dollarDiff) < 0.005 ? 'BE' : money(t.dollarDiff);
      } else {
        valStr = Math.abs(t.pct) < 0.005 ? 'BE' : `${t.pct>0?'+':''}${t.pct.toFixed(2)}%`;
      }
      lines.push(`${i+1}. ${emoji} ${contractDisplay(t.contract)} @ $${t.entryPrice.toFixed(2)} -> $${t.exitPrice.toFixed(2)} (${valStr})`);
    });
    lines.push('');
    // "Did not fill" line hidden for now (both live and paper).
    lines.push(`Total Trades: ${trades.length} (${wins} W, ${losses} L)`);
    if (pctTrades.length){
      lines.push(`Net Profit: **${net>0?'+':''}${net.toFixed(2)}%** (+${gainSum.toFixed(2)}% gain, ${lossSum.toFixed(2)}% loss)`);
    }
    if (futuresByRoot.size === 1){
      const [root, list] = [...futuresByRoot.entries()][0];
      const g = list.filter(t=>t.dollarDiff>0).reduce((s,t)=>s+t.dollarDiff,0);
      const l = list.filter(t=>t.dollarDiff<0).reduce((s,t)=>s+t.dollarDiff,0);
      lines.push(`Net Profit: ${money(g+l)} per contract (${money(g)} gain, ${money(l)} loss)`);
    } else if (futuresByRoot.size > 1){
      futuresByRoot.forEach((list, root) => {
        const g = list.filter(t=>t.dollarDiff>0).reduce((s,t)=>s+t.dollarDiff,0);
        const l = list.filter(t=>t.dollarDiff<0).reduce((s,t)=>s+t.dollarDiff,0);
        lines.push(`Net Profit (${root}): ${money(g+l)} per contract (${money(g)} gain, ${money(l)} loss)`);
      });
      const allG = futuresTrades.filter(t=>t.dollarDiff>0).reduce((s,t)=>s+t.dollarDiff,0);
      const allL = futuresTrades.filter(t=>t.dollarDiff<0).reduce((s,t)=>s+t.dollarDiff,0);
      lines.push(`Net Profit (All): ${money(allG+allL)} per contract (${money(allG)} gain, ${money(allL)} loss)`);
    }

    outputBlock.textContent = lines.join('\n');

    noticesEl.innerHTML = '';
    if (!trades.length){
      const d = document.createElement('div');
      d.textContent = `No closed trades found for this subscription. Try a different one above.`;
      d.style.color = '#b00020';
      d.style.fontSize = '13px';
      noticesEl.appendChild(d);
    }

    outputCard.style.display = 'block';
  }

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(outputBlock.textContent).then(() => {
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    });
  });
})();
</script>
</body>
</html>
